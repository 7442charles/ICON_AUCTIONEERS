<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>ICON AUCTIONEERS | Professional Auction Services in Nairobi</title>
    <meta name="description" content="ICON AUCTIONEERS provides expert auctioneering services, asset disposal, and property valuation. Leading professional auction firm based in Nairobi, Kenya.">
    <meta name="keywords" content="Auctioneers Nairobi, Kenya Auction firm, property auction, asset disposal, professional auctioneers, ICON AUCTIONEERS">
    <meta name="author" content="ICON AUCTIONEERS">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="ICON AUCTIONEERS | Professional Auction Services">
    <meta property="og:description" content="Expert auctioneering and asset management services. Trusted, transparent, and professional.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="#"> <!-- TODO:ADD THE MAIN URL HERE -->

    <!-- Favicon -->
    <link rel="icon" href="Assets/images/Icon_Auctioneers_logo.png" type="image/x-icon">

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#08122B',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">

<!-- Top Info Bar Section -->
<div class="bg-[#08122B] text-gray-400 text-xs py-2 border-b border-gray-800">
    <div class="container mx-auto px-4 md:px-10 flex flex-wrap md:flex-nowrap justify-center md:justify-between items-center gap-y-2 gap-x-6">
        
        <!-- Contact Information: flex-row keeps them on the same line -->
        <div class="flex flex-row items-center gap-4">
            <a href="mailto:info@iconauctions.co.ke" class="hover:text-white transition-colors">
                info@iconauctions.co.ke
            </a>
            <a href="tel:+254722488446" class="hover:text-white transition-colors">
                +254 722 488 446
            </a>
        </div>
        
        <!-- Credential Info: w-full pushes it to a new line on mobile -->
        <div class="w-full md:w-auto uppercase tracking-widest text-[10px] text-center md:text-right">
            Class B Licensed & Insured - Est. 2005
        </div>
    </div>
</div>




<!-- Main Navbar -->
<nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 md:px-10 py-4 flex justify-between items-center">
        <!-- Logo -->
        <a href="/">
            <img src="Assets/images/Icon_Auctioneers_logo.png" alt="Icon Auctioneers Logo" class="h-10 md:h-12 w-auto">
        </a>

        <!-- Desktop Menu -->
        <div class="hidden lg:flex items-center space-x-6 text-sm font-semibold text-gray-700">
            <a href="#" class="text-blue-700 border-b-2 border-blue-700 pb-1">Home</a>
            <a href="#" class="hover:text-blue-700 transition">Live & Upcoming</a>
            <a href="#" class="hover:text-blue-700 transition">How It Works</a>
            <a href="#" class="hover:text-blue-700 transition">Services</a>
            <a href="#" class="hover:text-blue-700 transition">Premium</a>
            <a href="#" class="hover:text-blue-700 transition">Gallery</a>
            <a href="#" class="hover:text-blue-700 transition">Contact</a>
        </div>

        <!-- Right Side: Auth Buttons + Hamburger -->
        <div class="flex items-center space-x-4">
            <!-- Auth Buttons (Visible on Tablet/Desktop) -->
            <div class="hidden md:flex items-center space-x-4">
                <a href="#" class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-50 transition text-sm font-semibold">Sign in</a>
                <a href="#" class="px-4 py-2 bg-[#08122B] text-white rounded hover:bg-blue-950 transition text-sm font-semibold">Register</a>
            </div>

            <!-- Hamburger Icon (Visible on Mobile/Tablet) -->
            <button id="menu-btn" class="lg:hidden p-2 text-gray-700">
                <i class="fas fa-bars text-2xl"></i>
            </button>
        </div>
    </div>

    <!-- Mobile Drawer -->
    <div id="mobile-menu" class="fixed inset-0 bg-[#08122B] text-white z-50 transform -translate-x-full transition-transform duration-300">
        <!-- Drawer Header -->
        <div class="bg-white p-4 flex justify-between items-center shadow-sm">
            <img src="Assets/images/Icon_Auctioneers_logo.png" alt="Icon Auctioneers Logo" class="h-8 w-auto">
            <button id="close-btn" class="text-[#08122B]">
                <i class="fas fa-times text-2xl"></i>
            </button>
        </div>
        <!-- Drawer Links -->
        <div class="p-6 flex flex-col space-y-8 text-2xl font-bold">
            <a href="#">Home</a>
            <a href="#">Live & Upcoming</a>
            <a href="#">How It Works</a>
            <a href="#">Services</a>
            <a href="#">Premium</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </div>
    </div>
</nav>

<script>
    const menuBtn = document.getElementById('menu-btn');
    const closeBtn = document.getElementById('close-btn');
    const mobileMenu = document.getElementById('mobile-menu');

    menuBtn.addEventListener('click', () => mobileMenu.classList.remove('-translate-x-full'));
    closeBtn.addEventListener('click', () => mobileMenu.classList.add('-translate-x-full'));
</script>
</body>
</html>
